<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Подбор сценария ЭПД</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .quiz-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .warning {
            background: #fff4e5;
            border: 1px solid #ffa940;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #8b5a00;
        }
        
        .warning::before {
            content: "⚠️";
            font-size: 20px;
        }
        
        .progress-bar {
            background: white;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .progress-fill {
            height: 8px;
            background: linear-gradient(90deg, #a78bfa 0%, #8b5cf6 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .step-indicator {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .card {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1e293b;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 600;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .option-card {
            background: #fafbfc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .option-card:hover {
            border-color: #a78bfa;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(167, 139, 250, 0.15);
        }
        
        .option-card.selected {
            border-color: #8b5cf6;
            background: #f5f3ff;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        }
        
        .option-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        
        .option-icon {
            font-size: 48px;
            margin-bottom: 16px;
            pointer-events: none;
        }
        
        .option-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            pointer-events: none;
        }
        
        .option-description {
            font-size: 13px;
            color: #64748b;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        
        .option-description span {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 140px;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        
        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .btn-back {
            background: #e2e8f0;
            color: #475569;
        }
        
        .btn-back:hover {
            background: #cbd5e1;
        }
        
        .result {
            text-align: center;
        }
        
        .result-image {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            margin: 30px 0;
        }
        
        .result-title {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 16px;
            font-weight: 700;
        }
        
        .result-description {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .result-client {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .result-client h4 {
            color: #166534;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .result-client p {
            color: #166534;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .btn-restart {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-restart:hover {
            background: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="warning">
            С сентября 2026 года ЭТрН станет обязательным
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        
        <div class="step-indicator" id="stepIndicator"></div>
        
        <div id="quizContent"></div>
    </div>

    <script>
        const scenarioLogic = {
            1: { 
                customer: 'sender', 
                carriers: 'one', 
                special: 'no',
                title: 'Заказчик — грузоотправитель',
                description: 'Вы отправляете свой груз, один перевозчик, стандартные условия.'
            },
            2: { 
                customer: 'sender', 
                carriers: 'multiple', 
                special: 'no',
                title: 'Перевозка с переменой транспорта',
                description: 'Вы отправляете груз, участвует несколько перевозчиков.'
            },
            3: { 
                customer: 'receiver', 
                carriers: 'one', 
                special: 'no',
                title: 'Заказчик — грузополучатель',
                description: 'Вам доставляют груз, вы являетесь получателем и заказчиком.'
            },
            4: { 
                customer: 'third_party', 
                carriers: 'one', 
                special: 'no',
                title: 'Заказчик — третье лицо (экспедитор)',
                description: 'Вы посредник/экспедитор, организующий перевозку.'
            },
            5: { 
                customer: 'sender', 
                carriers: 'one', 
                special: 'temp',
                title: 'Перевозка с температурным режимом',
                description: 'Вы отправитель, груз требует контроля температуры.'
            },
            6: { 
                customer: 'sender', 
                carriers: 'one', 
                special: 'dangerous',
                title: 'Перевозка опасного груза',
                description: 'Вы отправитель, груз относится к опасным (ДОПОГ).'
            },
            7: { 
                customer: 'receiver', 
                carriers: 'multiple', 
                special: 'no',
                title: 'Получатель + несколько перевозчиков',
                description: 'Вы получатель, груз доставят со сменой транспорта.'
            },
            8: { 
                customer: 'third_party', 
                carriers: 'multiple', 
                special: 'no',
                title: 'Экспедитор + несколько перевозчиков',
                description: 'Вы экспедитор, организуете перевозку с несколькими перевозчиками.'
            },
            9: { 
                customer: 'sender', 
                carriers: 'multiple', 
                special: 'temp',
                title: 'Температурный режим + несколько перевозчиков',
                description: 'Вы отправитель, груз с температурным контролем и сменой транспорта.'
            },
            10: { 
                customer: 'sender', 
                carriers: 'multiple', 
                special: 'dangerous',
                title: 'Опасный груз + несколько перевозчиков',
                description: 'Вы отправитель, опасный груз со сменой транспорта.'
            },
            11: { 
                customer: 'receiver', 
                carriers: 'one', 
                special: 'temp',
                title: 'Получатель + температурный режим',
                description: 'Вы получатель груза с контролем температуры.'
            }
        };

        const customerLabels = {
            sender: 'Грузоотправитель',
            receiver: 'Грузополучатель',
            third_party: 'Третье лицо (экспедитор)'
        };

        const questions = [
            {
                id: 1,
                title: "Кто является заказчиком перевозки?",
                icon: "👤",
                options: [
                    { 
                        value: "sender", 
                        icon: "📤",
                        label: "Грузоотправитель",
                        details: ["Я отправляю свой груз"]
                    },
                    { 
                        value: "receiver", 
                        icon: "📥",
                        label: "Грузополучатель",
                        details: ["Мне привезут груз"]
                    },
                    { 
                        value: "third_party", 
                        icon: "🤝",
                        label: "Третье лицо",
                        details: ["Посредник/экспедитор"]
                    }
                ]
            },
            {
                id: 2,
                title: "Сколько перевозчиков участвует?",
                icon: "🚚",
                options: [
                    { 
                        value: "one", 
                        icon: "1️⃣",
                        label: "Один перевозчик",
                        details: ["Прямая доставка"]
                    },
                    { 
                        value: "multiple", 
                        icon: "🔄",
                        label: "Несколько перевозчиков",
                        details: ["Смена транспорта"]
                    }
                ]
            },
            {
                id: 3,
                title: "Особые условия перевозки",
                icon: "⚙️",
                options: [
                    { 
                        value: "no", 
                        icon: "📦",
                        label: "Обычный груз",
                        details: ["Стандартные условия"]
                    },
                    { 
                        value: "temp", 
                        icon: "🌡️",
                        label: "Температурный режим",
                        details: ["Требуется контроль температуры"]
                    },
                    { 
                        value: "dangerous", 
                        icon: "⚠️",
                        label: "Опасный груз",
                        details: ["ДОПОГ"]
                    }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = {};

        function renderQuestion() {
            const question = questions[currentQuestion];
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('stepIndicator').textContent = `Шаг ${currentQuestion + 1} из ${questions.length}`;

            const selectedValue = answers[question.id];

            const contentDiv = document.getElementById('quizContent');
            contentDiv.innerHTML = `
                <div class="card active">
                    <div class="card-title">
                        ${question.icon} ${question.title}
                    </div>
                    <div class="options-grid">
                        ${question.options.map(opt => `
                            <div class="option-card ${selectedValue === opt.value ? 'selected' : ''}" 
                                 data-value="${opt.value}" 
                                 data-question="${question.id}">
                                <input type="radio" 
                                       name="q${question.id}" 
                                       value="${opt.value}"
                                       ${selectedValue === opt.value ? 'checked' : ''}>
                                <div class="option-icon">${opt.icon}</div>
                                <div class="option-title">${opt.label}</div>
                                <div class="option-description">
                                    ${opt.details.map(d => `<span>• ${d}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="buttons">
                        ${currentQuestion > 0 ? '<button class="btn-back" id="btnBack">Назад</button>' : ''}
                        <button class="btn-next" id="btnNext" ${!selectedValue ? 'disabled' : ''}>
                            ${currentQuestion < questions.length - 1 ? 'Продолжить →' : 'Показать результат'}
                        </button>
                    </div>
                </div>
            `;

            // Добавляем обработчики событий
            const optionCards = contentDiv.querySelectorAll('.option-card');
            optionCards.forEach(card => {
                card.addEventListener('click', function() {
                    const questionId = parseInt(this.dataset.question);
                    const value = this.dataset.value;
                    selectOption(questionId, value);
                });
            });

            const btnNext = contentDiv.querySelector('#btnNext');
            if (btnNext) {
                btnNext.addEventListener('click', nextQuestion);
            }

            const btnBack = contentDiv.querySelector('#btnBack');
            if (btnBack) {
                btnBack.addEventListener('click', prevQuestion);
            }
        }

        function selectOption(questionId, value) {
            answers[questionId] = value;
            
            // Обновляем только состояние кнопки и выбранные карточки
            const selectedCards = document.querySelectorAll('.option-card');
            selectedCards.forEach(card => {
                if (parseInt(card.dataset.question) === questionId) {
                    if (card.dataset.value === value) {
                        card.classList.add('selected');
                        card.querySelector('input[type="radio"]').checked = true;
                    } else {
                        card.classList.remove('selected');
                        card.querySelector('input[type="radio"]').checked = false;
                    }
                }
            });

            const btnNext = document.getElementById('btnNext');
            if (btnNext) {
                btnNext.disabled = false;
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function determineScenario() {
            const userAnswers = {
                customer: answers[1],
                carriers: answers[2],
                special: answers[3]
            };

            for (let scenarioNum in scenarioLogic) {
                const scenario = scenarioLogic[scenarioNum];
                if (
                    scenario.customer === userAnswers.customer &&
                    scenario.carriers === userAnswers.carriers &&
                    scenario.special === userAnswers.special
                ) {
                    return parseInt(scenarioNum);
                }
            }

            return 1;
        }

        function showResult() {
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('stepIndicator').textContent = 'Готово!';
            
            const scenarioNum = determineScenario();
            const scenario = scenarioLogic[scenarioNum];
            const clientRole = customerLabels[scenario.customer];
            
            const contentDiv = document.getElementById('quizContent');
            contentDiv.innerHTML = `
                <div class="card active">
                    <div class="result">
                        <div class="result-title">Сценарий №${scenarioNum}</div>
                        <div class="result-description">${scenario.title}</div>
                        
                        <div class="result-client">
                            <h4>👤 Ваша роль в сценарии:</h4>
                            <p><strong>${clientRole}</strong></p>
                            <p>${scenario.description}</p>
                        </div>

                        <img src="Stsenariy_${scenarioNum}.webp" 
                             alt="Сценарий ${scenarioNum}" 
                             class="result-image" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 800 600%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22800%22 height=%22600%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2224%22 text-anchor=%22middle%22 fill=%22%23999%22%3EСценарий ${scenarioNum}%3C/text%3E%3C/svg%3E'">
                        
                        <button class="btn-restart" id="btnRestart">Пройти заново</button>
                    </div>
                </div>
            `;

            const btnRestart = contentDiv.querySelector('#btnRestart');
            if (btnRestart) {
                btnRestart.addEventListener('click', restart);
            }
        }

        function restart() {
            currentQuestion = 0;
            answers = {};
            renderQuestion();
        }

        renderQuestion();
    </script>
</body>
</html>
